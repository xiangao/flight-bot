routes:
  - name: "Asia Grand Tour"
    type: multi_city
    provider: serpapi
    segments:
      - origin: BOS
        destination: NRT
        stay_min: 7
        stay_max: 10
      - origin: KIX
        destination: HKG
        stay_min: 14
        stay_max: 18
      - origin: HKG
        destination: BOS
    max_stops: 0   # each leg nonstop: BOS→NRT, KIX→HKG, HKG→BOS

  - name: "BOS ↔ Beijing / Shanghai / HK"
    csv_name: "Boston-China 3-week"   # matches historical CSV data
    type: round_trip
    provider: ignav
    origin: BOS
    destinations:
      - code: PEK
        name: Beijing
      - code: PVG
        name: Shanghai
      - code: HKG
        name: Hong Kong
    stay_min: 21
    stay_max: 30
    stay_step: 3
    max_stops: 1   # show both nonstop and 1-stop live panels

search:
  provider: ignav
  date_start: "2026-10-01"
  date_end: "2026-11-30"
  sample_dates: 4
  alert_threshold: 0.10
  cache_hours: 6
  market: US
  cabin_class: economy
